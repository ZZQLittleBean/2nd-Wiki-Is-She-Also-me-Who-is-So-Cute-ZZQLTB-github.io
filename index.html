        // ==================== 搜索 ====================
        handleSearchInput(value) {
            const dropdown = document.getElementById('search-dropdown');
            if (!value.trim()) { dropdown.classList.add('hidden'); return; }
            const results = this.data.entries.filter(e => {
                const v = this.getVisibleVersion(e);
                const title = v ? v.title : '';
                return e.code.toLowerCase().includes(value.toLowerCase()) || title.toLowerCase().includes(value.toLowerCase());
            }).slice(0, 10);
            if (results.length === 0) { dropdown.innerHTML = '<div class="p-4 text-sm text-gray-500 text-center">无结果</div>'; dropdown.classList.remove('hidden'); return; }
            dropdown.innerHTML = results.map(e => {
                const v = this.getVisibleVersion(e);
                const status = this.getCharacterDisplayStatus(e);
                const statusTag = status === 'future' ? '<span class="search-tag future">未来</span>' : status === 'missing' ? '<span class="search-tag past">失踪</span>' : '<span class="search-tag current">当前</span>';
                return `<div class="search-item" onclick="app.openEntry('${e.id}'); app.hideSearchDropdown();">
                    <span class="text-xs font-mono bg-gray-100 px-2 py-0.5 rounded">${e.code}</span>
                    <span class="text-sm text-gray-700">${this.escapeHtml(v?.title || '')}</span>
                    ${statusTag}
                </div>`;
            }).join('');
            dropdown.classList.remove('hidden');
        },

        showSearchDropdown() { if (document.getElementById('global-search').value.trim()) document.getElementById('search-dropdown').classList.remove('hidden'); },
        hideSearchDropdown() { document.getElementById('search-dropdown').classList.add('hidden'); },

        // ==================== 导航 ====================
        openEntry(entryId, versionId) {
            const entry = this.data.entries.find(e => e.id === entryId);
            if (!entry) return;
            this.data.editingId = entryId;
            if (versionId && entry.versions.some(v => v.vid === versionId)) {
                this.data.viewingVersionId = versionId;
            } else {
                this.data.viewingVersionId = null;
            }
            this.addToHistory(entry);
            this.router('detail');
        },

        openEntryWithVersion(entryId, versionId) {
            this.openEntry(entryId, versionId);
        },

        goBack() {
            const entry = this.data.entries.find(e => e.id === this.data.editingId);
            if (entry && entry.type === 'non-character') this.router('non-characters');
            else this.router('characters');
        },

        addToHistory(entry) {
            if (!this.data.history) this.data.history = [];
            this.data.history = this.data.history.filter(h => h.id !== entry.id);
            this.data.history.push({ id: entry.id, timestamp: Date.now() });
            if (this.data.history.length > 50) this.data.history = this.data.history.slice(-50);
        },

        // ==================== 时间轴 ====================
        setTimeline(chapterId) {
            this.data.currentTimeline = chapterId;
            const toast = document.getElementById('timeline-switch-toast');
            const toastText = document.getElementById('timeline-switch-text');
            if (chapterId === 'latest') {
                if (toastText) toastText.textContent = '已切换到最新进度';
            } else {
                const ch = this.data.chapters.find(c => c.id === chapterId);
                if (toastText && ch) toastText.textContent = `已切换到 ${this.formatChapterNum(ch.num)} ${ch.title || ''}`;
            }
            if (toast) { toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 3000); }
            // 刷新当前视图
            const currentView = this.data.currentView;
            if (currentView === 'characters' || currentView === 'non-characters' || currentView === 'detail' || currentView === 'graph') {
                this.router(currentView, true);
            }
        },

        // ==================== 公告 ====================
        viewAnnouncement() {
            const ann = this.data.announcements?.find(a => a.isActive);
            if (!ann) { this.showToast('当前没有生效的公告', 'info'); return; }
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/60 z-[99999] flex items-center justify-center p-4 fade-in';
            overlay.innerHTML = `
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[80vh] flex flex-col overflow-hidden">
                    <div class="p-4 border-b bg-gradient-to-r from-orange-50 to-amber-50 flex justify-between items-center">
                        <div><h3 class="font-bold text-lg text-gray-800">${this.escapeHtml(ann.title || '公告')}</h3><p class="text-xs text-gray-500">${this.escapeHtml(ann.author || '匿名')} · ${ann.date || ''}</p></div>
                        <button onclick="this.closest('.fixed').remove()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-times"></i></button>
                    </div>
                    <div class="p-6 overflow-y-auto prose prose-sm max-w-none">${ann.content || ''}</div>
                </div>`;
            document.body.appendChild(overlay);
            overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
        },

        // ==================== Toast ====================
        showToast(message, type = 'info', duration = 3000) {
            const toast = document.createElement('div');
            toast.className = `fixed top-20 left-1/2 transform -translate-x-1/2 z-[99999] px-4 py-2 rounded-lg shadow-lg text-white text-sm flex items-center gap-2 fade-in ${type === 'success' ? 'bg-green-600' : type === 'warning' ? 'bg-amber-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600'}`;
            const icons = { info: 'fa-circle-info', success: 'fa-check-circle', warning: 'fa-triangle-exclamation', error: 'fa-circle-exclamation' };
            toast.innerHTML = `<i class="fa-solid ${icons[type] || icons.info}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'all 0.3s ease'; setTimeout(() => toast.remove(), 300); }, duration);
        },

        // ==================== 关系图谱 ====================
        renderGraph(container) {
            if (this.isDataEmpty()) {
                this.showEmptyState(container, '暂无角色数据', '管理员尚未添加角色，关系图无法显示。');
                return;
            }
            const tpl = document.getElementById('tpl-graph');
            if (!tpl) return;
            const clone = tpl.content.cloneNode(true);
            container.appendChild(clone);
            this.initDraggablePanel();
            setTimeout(() => this.renderGraphNodes(), 50);
        },

        initDraggablePanel() {
            const panel = document.getElementById('graph-info-panel');
            if (!panel) return;
            const handle = panel.querySelector('.draggable-handle');
            if (!handle) return;
            let isDragging = false, startX, startY, initialX, initialY;
            handle.addEventListener('mousedown', (e) => { isDragging = true; panel.classList.add('dragging'); startX = e.clientX; startY = e.clientY; const rect = panel.getBoundingClientRect(); initialX = rect.left; initialY = rect.top; e.preventDefault(); });
            document.addEventListener('mousemove', (e) => { if (!isDragging) return; const dx = e.clientX - startX; const dy = e.clientY - startY; panel.style.left = `${initialX + dx}px`; panel.style.top = `${initialY + dy}px`; panel.style.right = 'auto'; });
            document.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; panel.classList.remove('dragging'); } });
        },

        togglePanelCollapse() {
            const content = document.getElementById('panel-content');
            const icon = document.querySelector('#graph-info-panel button i');
            if (!content || !icon) return;
            if (content.classList.contains('hidden')) { content.classList.remove('hidden'); icon.className = 'fa-solid fa-minus'; }
            else { content.classList.add('hidden'); icon.className = 'fa-solid fa-plus'; }
        },

        renderGraphNodes() {
            const container = document.getElementById('graph-nodes');
            const svg = document.getElementById('graph-svg');
            if (!container || !svg) return;
            container.innerHTML = '';
            svg.innerHTML = '';
            let chars = this.data.entries.filter(e => e.type === 'character');
            if (this.data.currentTimeline !== 'latest') chars = chars.filter(e => this.getVisibleVersion(e) !== null);
            if (chars.length === 0) { container.innerHTML = '<div class="text-center text-gray-400 mt-20">暂无角色数据</div>'; return; }

            const hexRadius = 80, hexWidth = hexRadius * Math.sqrt(3), hexHeight = hexRadius * 2;
            const containerRect = container.getBoundingClientRect();
            const centerX = containerRect.width / 2, centerY = containerRect.height / 2;
            const positions = this.calculateHoneycombPositions(chars.length, hexWidth, hexHeight, centerX, centerY);

            chars.forEach((char, idx) => {
                const version = this.getVisibleVersion(char);
                if (!version) return;
                const pos = positions[idx];
                const node = document.createElement('div');
                node.className = 'hexagon-wrapper absolute';
                node.style.left = `${pos.x - 70}px`; node.style.top = `${pos.y - 80}px`;
                node.style.width = '140px'; node.style.height = '160px';
                node.dataset.charId = char.id;

                let avatarImg = version.images?.avatar || version.image;
                avatarImg = this.resolveImageUrl(avatarImg);

                node.innerHTML = `
                    <div class="hexagon lvl-${version.level || char.level || 3}">
                        <div class="hexagon-content">
                            <div class="w-16 h-16 rounded-full bg-gray-200 overflow-hidden mb-2 border-2 border-white shadow">
                                ${avatarImg ? `<img src="${avatarImg}" class="w-full h-full object-cover" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'w-full h-full bg-indigo-100 flex items-center justify-center text-indigo-500 text-xs font-bold\\'>${char.code}</div>'">` : `<div class="w-full h-full bg-indigo-100 flex items-center justify-center text-indigo-500 text-xs font-bold">${char.code}</div>`}
                            </div>
                            <div class="text-xs font-bold text-center truncate w-full px-2">${this.escapeHtml(version.title)}</div>
                            ${(version.level === 1 || char.level === 1) ? '<div class="absolute -top-1 -right-1 w-6 h-6 bg-yellow-500 rounded-full flex items-center justify-center text-white text-[10px] shadow"><i class="fa-solid fa-star"></i></div>' : ''}
                        </div>
                    </div>`;

                let clickTimer = null, clickCount = 0;
                node.onclick = (e) => {
                    e.stopPropagation();
                    clickCount++;
                    if (clickCount === 1) { this.selectGraphNode(char); clickTimer = setTimeout(() => { clickCount = 0; }, 300); }
                    else if (clickCount === 2) { clearTimeout(clickTimer); clickCount = 0; this.openEntry(char.id); }
                };
                container.appendChild(node);
            });
            this.drawRelationLines(chars, positions);
            const graphContainer = document.getElementById('graph-container');
            if (graphContainer) graphContainer.onclick = (e) => { if (e.target.id === 'graph-container' || e.target.id === 'graph-svg') this.resetGraphSelection(); };
        },

        calculateHoneycombPositions(count, hexW, hexH, centerX, centerY) {
            const positions = [{ x: centerX, y: centerY }];
            if (count <= 1) return positions;
            let ring = 1, remaining = count - 1;
            while (remaining > 0) {
                const ringCount = ring * 6;
                for (let i = 0; i < Math.min(ringCount, remaining); i++) {
                    const angle = (i / ringCount) * Math.PI * 2 - Math.PI / 2;
                    const radius = ring * hexW;
                    positions.push({ x: centerX + Math.cos(angle) * radius, y: centerY + Math.sin(angle) * radius * 0.866 });
                }
                remaining -= ringCount; ring++;
            }
            return positions;
        },

        drawRelationLines(chars, positions) {
            const svg = document.getElementById('graph-svg');
            if (!svg) return;
            chars.forEach((char, idx) => {
                const version = this.getVisibleVersion(char);
                if (!version || !version.relatedCharacters) return;
                const startPos = positions[idx];
                version.relatedCharacters.forEach(rc => {
                    const targetIdx = chars.findIndex(c => c.id === rc.charId);
                    if (targetIdx === -1) return;
                    const endPos = positions[targetIdx];
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', startPos.x); line.setAttribute('y1', startPos.y);
                    line.setAttribute('x2', endPos.x); line.setAttribute('y2', endPos.y);
                    line.setAttribute('stroke', '#cbd5e1'); line.setAttribute('stroke-width', '2'); line.setAttribute('stroke-dasharray', '5,5');
                    svg.appendChild(line);
                });
            });
        },

        selectGraphNode(char) {
            const version = this.getVisibleVersion(char);
            if (!version) return;
            const infoDiv = document.getElementById('selected-character-info');
            const emptyHint = document.getElementById('graph-empty-hint');
            if (emptyHint) emptyHint.classList.add('hidden');
            if (infoDiv) infoDiv.classList.remove('hidden');
            const nameEl = document.getElementById('selected-char-name');
            if (nameEl) nameEl.innerHTML = `<div class="flex items-center justify-between gap-2"><span class="truncate cursor-pointer hover:text-indigo-600 transition" onclick="app.openEntry('${char.id}')">${this.escapeHtml(version.title)}</span><button onclick="app.openEntry('${char.id}')" class="shrink-0 text-xs bg-indigo-600 text-white px-2 py-1 rounded hover:bg-indigo-700 transition whitespace-nowrap">查看词条</button></div>`;
            const relationEl = document.getElementById('selected-char-relation');
            if (relationEl) {
                let relationText = '';
                if (version.relatedCharacters && version.relatedCharacters.length > 0) {
                    relationText = version.relatedCharacters.map(rc => {
                        const relatedChar = this.data.entries.find(e => e.id === rc.charId);
                        if (!relatedChar) return '';
                        const relatedVersion = this.getVisibleVersion(relatedChar);
                        return `与 ${this.escapeHtml(relatedVersion ? relatedVersion.title : relatedChar.code)} 是${this.escapeHtml(rc.relationName)}`;
                    }).filter(Boolean).join('；');
                }
                relationEl.textContent = relationText || '暂无关系';
            }
            document.querySelectorAll('.hexagon-wrapper').forEach(node => {
                if (node.dataset.charId === char.id) { node.style.opacity = '1'; node.style.transform = 'scale(1.1)'; node.style.zIndex = '10'; node.style.filter = 'drop-shadow(0 8px 16px rgba(0,0,0,0.2))'; }
                else { node.style.opacity = '0.3'; node.style.transform = 'scale(1)'; node.style.zIndex = '1'; node.style.filter = 'none'; }
            });
            const related = (version.relatedCharacters || []).map(rc => {
                const entry = this.data.entries.find(e => e.id === rc.charId);
                return entry ? { entry, level: entry.level || 5 } : null;
            }).filter(Boolean);
            related.forEach(r => {
                const node = document.querySelector(`.hexagon-wrapper[data-char-id="${r.entry.id}"]`);
                if (node) { node.style.opacity = '1'; node.style.transform = 'scale(1.05)'; }
            });
        },

        resetGraphSelection() {
            document.querySelectorAll('.hexagon-wrapper').forEach(node => { node.style.opacity = '1'; node.style.transform = 'scale(1)'; node.style.zIndex = '1'; node.style.filter = 'none'; });
            const infoDiv = document.getElementById('selected-character-info');
            const emptyHint = document.getElementById('graph-empty-hint');
            if (infoDiv) infoDiv.classList.add('hidden');
            if (emptyHint) emptyHint.classList.remove('hidden');
        },

        zoomIn() { this.data.graphState.scale = Math.min(this.data.graphState.scale * 1.2, 3); this.applyGraphTransform(); },
        zoomOut() { this.data.graphState.scale = Math.max(this.data.graphState.scale / 1.2, 0.3); this.applyGraphTransform(); },
        resetGraphView() { this.data.graphState.scale = 1; this.data.graphState.translateX = 0; this.data.graphState.translateY = 0; this.applyGraphTransform(); },
        applyGraphTransform() {
            const nodes = document.getElementById('graph-nodes');
            const svg = document.getElementById('graph-svg');
            const transform = `translate(${this.data.graphState.translateX}px, ${this.data.graphState.translateY}px) scale(${this.data.graphState.scale})`;
            if (nodes) nodes.style.transform = transform;
            if (svg) svg.style.transform = transform;
        },

        // ==================== 剧情梗概浏览 ====================
        renderSynopsisView(container) {
            if (!this.data.synopsis || this.data.synopsis.length === 0) {
                this.showEmptyState(container, '暂无剧情梗概', '管理员尚未添加剧情梗概，请检查存档文件。');
                return;
            }
            const tpl = document.getElementById('tpl-synopsis');
            if (!tpl) return;
            const clone = tpl.content.cloneNode(true);
            container.appendChild(clone);
            const list = document.getElementById('synopsis-view-list');
            if (list) this.renderSynopsisViewList(list);
            // 激活第一个
            setTimeout(() => { if (this.data.synopsis.length > 0) this.setSynopsisActiveIndex(0); }, 100);
        },

        renderSynopsisViewList(container) {
            container.innerHTML = '';
            this.data.synopsis.forEach((chapter, idx) => {
                const item = document.createElement('div');
                item.className = 'synopsis-view-item';
                item.id = `synopsis-item-${idx}`;

                let imgHtml = '';
                if (chapter.image) {
                    const imgUrl = this.resolveImageUrl(chapter.image);
                    imgHtml = `<img src="${imgUrl}" class="synopsis-view-image" onerror="this.style.display='none'" alt="">`;
                }

                // 解析内容中的索引
                let contentHtml = this.parseContentText(chapter.content || '');

                item.innerHTML = `
                    <div class="synopsis-view-header">
                        <span class="synopsis-view-num">${this.escapeHtml(this.formatChapterNum(chapter.num))}</span>
                        <span class="synopsis-view-title">${this.escapeHtml(chapter.title || '')}</span>
                    </div>
                    ${imgHtml}
                    <div class="synopsis-view-content line-clamp" style="display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 3;">${contentHtml}</div>`;
                container.appendChild(item);
            });
        },

        setSynopsisActiveIndex(idx) {
            if (!this.data.synopsis || idx < 0 || idx >= this.data.synopsis.length) return;
            this.data.synopsisViewIndex = idx;
            document.querySelectorAll('.synopsis-view-item').forEach((item, i) => {
                if (i === idx) {
                    item.classList.add('active'); item.classList.remove('inactive');
                    const content = item.querySelector('.synopsis-view-content');
                    if (content) { content.classList.remove('line-clamp'); content.style.display = 'block'; }
                    const img = item.querySelector('.synopsis-view-image');
                    if (img) { img.style.maxHeight = '300px'; img.style.opacity = '1'; }
                } else {
                    item.classList.remove('active'); item.classList.add('inactive');
                    const content = item.querySelector('.synopsis-view-content');
                    if (content) { content.classList.add('line-clamp'); content.style.display = '-webkit-box'; content.style.webkitBoxOrient = 'vertical'; content.style.webkitLineClamp = '3'; }
                    const img = item.querySelector('.synopsis-view-image');
                    if (img) { img.style.maxHeight = '200px'; img.style.opacity = '0.5'; }
                }
            });
            this.scrollToSynopsisItem(idx);
            this.updateSwitchTimeButton();
        },

        scrollToSynopsisItem(idx) {
            const item = document.getElementById(`synopsis-item-${idx}`);
            if (item) item.scrollIntoView({ behavior: 'smooth', block: 'center' });
        },

        navigateSynopsis(direction) {
            const newIdx = this.data.synopsisViewIndex + direction;
            if (newIdx >= 0 && newIdx < this.data.synopsis.length) this.setSynopsisActiveIndex(newIdx);
        },

        updateSwitchTimeButton() {
            const btn = document.getElementById('synopsis-switch-time-btn');
            if (!btn) return;
            const chapter = this.data.synopsis[this.data.synopsisViewIndex];
            if (!chapter) { btn.classList.add('hidden'); return; }
            const chapterId = chapter.chapterId || chapter.id;
            const isDifferentTime = this.data.currentTimeline !== chapterId;
            btn.classList.toggle('hidden', !isDifferentTime);
            if (isDifferentTime) { requestAnimationFrame(() => { btn.style.setProperty('top', 'auto', 'important'); btn.style.setProperty('bottom', '80px', 'important'); btn.style.setProperty('right', '20px', 'important'); btn.style.setProperty('position', 'fixed', 'important'); }); }
        },

        switchToSynopsisTime() {
            const chapter = this.data.synopsis[this.data.synopsisViewIndex];
            if (!chapter) return;
            this.setTimeline(chapter.chapterId);
            this.updateSwitchTimeButton();
        },

        // ==================== 剧情引用悬浮窗 ====================
        showSynopsisTooltip(chapterId, triggerElement) {
            const chapter = this.data.synopsis.find(s => s.id === chapterId);
            if (!chapter) return;
            this.closeSynopsisTooltip();
            const tpl = document.getElementById('tpl-synopsis-tooltip');
            if (!tpl) return;
            const clone = tpl.content.cloneNode(true);
            document.body.appendChild(clone);
            const numEl = document.getElementById('tooltip-chapter-num');
            const titleEl = document.getElementById('tooltip-chapter-title');
            const imgEl = document.getElementById('tooltip-chapter-image');
            const contentEl = document.getElementById('tooltip-chapter-content');
            const tooltip = document.getElementById('synopsis-tooltip-box');
            if (!numEl || !titleEl || !contentEl || !tooltip) { this.closeSynopsisTooltip(); return; }
            numEl.textContent = this.formatChapterNum(chapter.num);
            titleEl.textContent = chapter.title || '';
            if (imgEl && chapter.image) { imgEl.src = this.resolveImageUrl(chapter.image); imgEl.classList.remove('hidden'); }
            contentEl.innerHTML = this.parseContentText(chapter.content || '<span class="text-gray-400 italic">暂无内容</span>');
            const rect = triggerElement.getBoundingClientRect();
            const tooltipWidth = 450, tooltipHeight = 300;
            let top = rect.bottom + 10 + window.scrollY;
            let left = rect.left + rect.width / 2 - tooltipWidth / 2 + window.scrollX;
            if (left + tooltipWidth > window.innerWidth) left = window.innerWidth - tooltipWidth - 20;
            if (left < 10) left = 10;
            if (top + tooltipHeight > window.innerHeight + window.scrollY) top = rect.top + window.scrollY - tooltipHeight - 10;
            tooltip.style.top = top + 'px'; tooltip.style.left = left + 'px';
            document.body.classList.add('body-dimmed');
            requestAnimationFrame(() => tooltip.classList.add('show'));
            this.currentTooltipChapterId = chapterId;
            tooltip.onclick = (e) => { e.stopPropagation(); this.closeSynopsisTooltip(); this.router('synopsis'); const idx = this.data.synopsis.findIndex(s => s.id === chapterId); if (idx !== -1) { this.data.synopsisViewIndex = idx; setTimeout(() => this.setSynopsisActiveIndex(idx), 100); } };
            this.tooltipClickOutsideHandler = (e) => { if (!tooltip.contains(e.target) && !triggerElement.contains(e.target)) this.closeSynopsisTooltip(); };
            setTimeout(() => document.addEventListener('click', this.tooltipClickOutsideHandler), 100);
        },

        closeSynopsisTooltip() {
            const tooltip = document.querySelector('.synopsis-tooltip');
            if (tooltip) tooltip.remove();
            document.body.classList.remove('body-dimmed');
            this.currentTooltipChapterId = null;
            if (this.tooltipClickOutsideHandler) { document.removeEventListener('click', this.tooltipClickOutsideHandler); this.tooltipClickOutsideHandler = null; }
        },

        handleSynopsisRefHover(element) {
            const chapterId = element.dataset.chapterId;
            if (!chapterId) return;
            if (this.currentTooltipChapterId === chapterId) return;
            if (this.tooltipHoverTimeout) clearTimeout(this.tooltipHoverTimeout);
            this.tooltipHoverTimeout = setTimeout(() => { this.tooltipHoverTimeout = null; this.showSynopsisTooltip(chapterId, element); }, 300);
        },

        handleSynopsisRefLeave(element) {
            if (this.tooltipHoverTimeout) { clearTimeout(this.tooltipHoverTimeout); this.tooltipHoverTimeout = null; }
            this.tooltipLeaveTimeout = setTimeout(() => {
                this.tooltipLeaveTimeout = null;
                const tooltip = document.querySelector('.synopsis-tooltip');
                if (tooltip) { if (tooltip.matches(':hover')) return; this.closeSynopsisTooltip(); }
            }, 300);
        },

        handleSynopsisRefClick(element) {
            const chapterId = element.dataset.chapterId;
            if (!chapterId) return;
            if (this.tooltipHoverTimeout) { clearTimeout(this.tooltipHoverTimeout); this.tooltipHoverTimeout = null; }
            if (this.currentTooltipChapterId === chapterId) { this.closeSynopsisTooltip(); this.router('synopsis'); const idx = this.data.synopsis.findIndex(s => s.id === chapterId); if (idx !== -1) { this.data.synopsisViewIndex = idx; setTimeout(() => this.setSynopsisActiveIndex(idx), 100); } }
            else this.showSynopsisTooltip(chapterId, element);
        },

        // ==================== 键盘导航 ====================
        initKeyboardListeners() {
            if (this._keyboardHandler) document.removeEventListener('keydown', this._keyboardHandler);
            this._keyboardHandler = (e) => {
                if (this.data.currentView !== 'synopsis') return;
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
                if (e.key === 'ArrowUp') { e.preventDefault(); e.stopPropagation(); this.navigateSynopsis(-1); }
                else if (e.key === 'ArrowDown') { e.preventDefault(); e.stopPropagation(); this.navigateSynopsis(1); }
                else if (e.key === 'Escape') { this.closeSynopsisTooltip(); }
            };
            document.addEventListener('keydown', this._keyboardHandler, true);
        }
    };

    // ==================== 启动 ====================
    document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
